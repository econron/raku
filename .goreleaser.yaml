# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: raku

builds:
  - id: raku
    main: ./cmd/raku
    binary: raku
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: raku
    ids:
      - raku
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

brews:
  - name: raku
    ids:
      - raku
    repository:
      owner: econron
      name: homebrew-tap
      branch: main
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/econron/raku"
    description: "GitHub PR review workflow helper"
    license: MIT
    test: |
      system "#{bin}/raku", "--help"
